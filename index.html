      { name: "爬蟲類", text: "完全適應陸地生活。體表具角質鱗片或骨板防水分散失。用肺呼吸，體內受精，產下具保護殼的卵，為外溫動物。" },
      { name: "鳥類", text: "體表有羽毛以利飛行與保暖，前肢特化為翼。骨骼中空輕盈，肺延伸出氣囊輔助呼吸，具瞬膜保護眼睛。內溫、體內受精、卵生。" },
      { name: "哺乳類", text: "內溫動物，體表有毛。具乳腺能分泌乳汁哺育幼兒。體內受精，多數為胎生（僅原始針鼴、鴨嘴獸為卵生）。" }
    ];

    const VERT_QUIZ_DATA = [
      { id: 'vq1', question: "鯊魚、魟魚與吳郭魚、彈塗魚同屬魚類，牠們最主要的體內構造差異是？", options: ["呼吸器官不同", "心臟房室數目不同", "骨骼有軟骨與硬骨的分別", "受精方式不同"], answer: 2, explanation: "鯊魚與魟魚屬於軟骨魚綱，骨骼全為軟骨；吳郭魚與彈塗魚則屬於硬骨魚綱，骨骼主要由硬骨組成。" },
      { id: 'vq2', question: "青蛙和山椒魚屬於兩生類，牠們為什麼不能完全離開陰暗潮濕的環境？", options: ["因為牠們完全用鰓呼吸", "因為牠們的皮膚無法防止水分散失，且肺不發達需靠濕潤皮膚輔助呼吸", "因為牠們是內溫動物", "因為牠們只吃水中的昆蟲"], answer: 1, explanation: "兩生類體表裸露沒有鱗片或毛髮阻擋水分散失，且成體肺部發育不完全，高度依賴濕潤的皮膚來進行氣體交換，因此無法離開潮濕環境。" },
      { id: 'vq3', question: "蜥蜴、蛇和烏龜比青蛙更能適應乾燥的陸地生活，最關鍵的特徵是？", options: ["體表具有鱗片或骨板防水分散失", "心臟具有兩心房兩心室", "四肢變得更加粗壯", "改用皮膚進行呼吸"], answer: 0, explanation: "爬蟲類體表具有角質鱗片或骨板，能有效防止體內水分蒸散，這是牠們能完全征服陸地、適應乾燥環境的關鍵構造。" },
      { id: 'vq4', question: "鳥類的骨骼具有「中空、輕盈」的特徵，這在演化上的主要適應意義為何？", options: ["方便產下體型較大的卵", "降低體溫以適應高空環境", "減輕體重以利於飛行", "增加骨髓儲存脂肪的空間"], answer: 2, explanation: "鳥類骨骼中空且質輕，配上流線型體型與特化的羽毛、氣囊，都是為了減輕體重、提高飛行效率的演化適應。" },
      { id: 'vq5', question: "蝙蝠會飛，海豚生活在海裡。請問牠們在分類上屬於哪一類動物？", options: ["蝙蝠是鳥類，海豚是魚類", "蝙蝠是哺乳類，海豚是魚類", "蝙蝠是鳥類，海豚是哺乳類", "兩者皆屬於哺乳類"], answer: 3, explanation: "蝙蝠與海豚雖然外觀與生活環境不同，打牠們都具備「胎生、哺乳、體表有毛、分泌乳汁」的特徵，皆屬於哺乳類。" },
      { id: 'vq6', question: "脊椎動物中，屬於「內溫動物(恆溫)」的組合是？", options: ["鳥類、哺乳類", "魚類、兩生類、爬蟲類", "爬蟲類、鳥類", "兩生類、哺乳類"], answer: 0, explanation: "鳥類和哺乳類能靠體內代謝產生熱量並維持恆定的體溫，屬於內溫動物；魚類、兩生類、爬蟲類則會隨環境改變體溫，為外溫動物。" },
      { id: 'vq7', question: "鴨嘴獸和針鼴雖然會「產卵」(卵生)，但科學家仍將牠們歸類為「哺乳類」的原因是？", options: ["牠們是變溫動物", "牠們具有羽毛構造", "牠們具有乳腺，會分泌乳汁哺育幼兒", "牠們生活在陸地上"], answer: 2, explanation: "哺乳類最核心的定義特徵是「具備乳腺能哺乳」。鴨嘴獸與針鼴是演化上最原始的哺乳類，雖然卵生，但仍用乳汁哺育後代。" },
      { id: 'vq8', question: "下列哪一種生物屬於兩生類、且「終生保有尾巴」？", options: ["青蛙", "山椒魚", "壁虎", "海龜"], answer: 1, explanation: "山椒魚屬於兩生類中的「有尾目」，成體依然保有尾巴。青蛙屬於無尾目；壁虎和烏龜則是爬蟲類。" },
      { id: 'vq9', question: "關於鳥類「氣囊」的功能，下列敘述何者正確？", options: ["可以代替肺進行氣體交換", "能儲存空氣輔助呼吸，並在飛行時幫助散熱與減輕比重", "用來消化未磨碎的穀物", "是用來發出聲音的鳴叫構造"], answer: 1, explanation: "鳥類的氣囊不直接進行氣體交換，但能儲存空氣讓肺部在吸氣與呼氣時都能獲得氧氣（雙重呼吸），並協助散熱與減輕比重。" },
      { id: 'vq10', question: "海龜、海豚、海馬三種生活在海中的脊椎動物，其分類由演化先到後依序為？", options: ["魚類 ➔ 爬蟲類 ➔ 哺乳類", "爬蟲類 ➔ 哺乳類 ➔ 魚類", "魚類 ➔ 哺乳類 ➔ 爬蟲類", "哺乳類 ➔ 爬蟲類 ➔ 魚類"], answer: 0, explanation: "海馬是用鰓呼吸的硬骨「魚類」；海龜是用肺呼吸、有骨板的「爬蟲類」；海豚則是胎生哺乳的「哺乳類」，故依演化順序為魚類➔爬蟲類➔哺乳類。" }
    ];

    function App() {
      const [userRole, setUserRole] = useState('login');
      const [studentClass, setStudentClass] = useState('701');
      const [studentName, setStudentName] = useState('');
      const [studentSeat, setStudentSeat] = useState('');
      
      const [gameMode, setGameMode] = useState('invert');
      const [activeTab, setActiveTab] = useState('knowledge');
      const [vertSubTab, setVertSubTab] = useState('feature');

      const [config, setConfig] = useState({ invertebrateOpen: true, vertebrateOpen: true });
      const [studentScores, setStudentScores] = useState([]); 
      const [refreshTrigger, setRefreshTrigger] = useState(0); 
      const [teacherSelectClass, setTeacherSelectClass] = useState('ALL');
      
      const [wrongCount, setWrongCount] = useState(0); 
      const [isQuizSubmitted, setIsQuizSubmitted] = useState(false);
      const [userQuizAnswers, setUserQuizAnswers] = useState({});     
      const [finalQuizScore, setFinalQuizScore] = useState(0);       
      
      const [selectedCard, setSelectedCard] = useState(null); 
      const [errorCardId, setErrorCardId] = useState(null);
      const [matchedCards, setMatchedCards] = useState([]);   
      const [seed, setSeed] = useState(0);                   

      // 脊椎動物遊戲狀態
      const [vertMatchedFeatures, setVertMatchedFeatures] = useState([]); 
      const [vertMatchedAnimals, setVertMatchedAnimals] = useState([]);   
      const [selectedVertFeature, setSelectedVertFeature] = useState(null);
      const [selectedVertAnimal, setSelectedVertAnimal] = useState(null);
      const [vertFeatureErrorId, setVertFeatureErrorId] = useState(null);
      const [vertAnimalErrorId, setVertAnimalErrorId] = useState(null);

      // 【修正1】將構造特徵卡牌改為「洗牌打亂順序」
      const shuffledVertFeatures = useMemo(() => {
        const remaining = VERT_FEATURE_CARDS.filter(f => !vertMatchedFeatures.some(m => m.id === f.id));
        return shuffleArray(remaining);
      }, [vertMatchedFeatures, seed]);

      const poolVertAnimals = useMemo(() => {
        const remaining = VERT_ANIMAL_CARDS.filter(f => !vertMatchedAnimals.some(m => m.id === f.id));
        return shuffleArray(remaining);
      }, [vertMatchedAnimals, seed]);

      // 無脊椎動物剩餘卡牌池 (保持原本邏輯)
      const poolCards = useMemo(() => {
        const remaining = INVERT_CARDS_DATA.filter(c => !matchedCards.some(m => m.id === c.id));
        return shuffleArray(remaining);
      }, [matchedCards, seed]);

      const totalCardsCount = gameMode === 'invert' ? INVERT_CARDS_DATA.length : (VERT_FEATURE_CARDS.length + VERT_ANIMAL_CARDS.length);

      const matchScore = useMemo(() => {
        if (gameMode === 'invert') {
          if (matchedCards.length === 0) return 0;
          return Math.max(0, Math.min(100, Math.round((matchedCards.length * (100 / INVERT_CARDS_DATA.length)) - wrongCount)));
        } else {
          const totalMatched = vertMatchedFeatures.length + vertMatchedAnimals.length;
          if (totalMatched === 0) return 0;
          return Math.max(0, Math.min(100, Math.round((totalMatched * (100 / totalCardsCount)) - wrongCount)));
        }
      }, [matchedCards, vertMatchedFeatures, vertMatchedAnimals, wrongCount, gameMode]);

      const filteredScores = useMemo(() => {
        if (teacherSelectClass === 'ALL') return studentScores;
        return studentScores.filter(score => score.class === teacherSelectClass);
      }, [studentScores, teacherSelectClass]);

      // 🔄 Firebase 配置監聽
      useEffect(() => {
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('config')
          .onSnapshot((doc) => { 
            if (doc.exists) {
              const data = doc.data();
              setConfig({
                invertebrateOpen: data.invertebrateOpen !== undefined ? data.invertebrateOpen : true,
                vertebrateOpen: data.vertebrateOpen !== undefined ? data.vertebrateOpen : true
              }); 
            }
          }, (err) => console.log(err));
        return () => unsubscribe();
      }, []);

      // 🔄 教師即時看板監聽
      useEffect(() => {
        if (userRole === 'teacher_admin') {
          const unsubscribeScores = db.collection('artifacts').doc(appId).collection('student_scores')
            .orderBy('timestamp', 'desc')
            .onSnapshot((snapshot) => {
              const scoresData = [];
              snapshot.forEach((doc) => { scoresData.push({ id: doc.id, ...doc.data() }); });
              setStudentScores(scoresData);
            }, (err) => console.error(err));
          return () => unsubscribeScores();
        }
      }, [userRole, refreshTrigger]);

      const startChapter = (mode) => {
        setGameMode(mode);
        setWrongCount(0);
        setIsQuizSubmitted(false);
        setUserQuizAnswers({});
        setFinalQuizScore(0);
        setSelectedCard(null);
        setMatchedCards([]);
        setVertMatchedFeatures([]);
        setVertMatchedAnimals([]);
        setSelectedVertFeature(null);
        setSelectedVertAnimal(null);
        setVertSubTab('feature');
        setActiveTab('knowledge');
        setSeed(prev => prev + 1);
        setUserRole('game_core');
      };

      const handleLogin = (role) => {
        if (role === 'student') {
          if (!studentName || !studentSeat) { alert('請輸入座號與姓名！'); return; }
          setStudentSeat(studentSeat.padStart(2, '0'));
          setUserRole('student_home');
        } else if (role === 'teacher') {
          const pwd = prompt('請輸入老師管理密碼：');
          if (pwd === '1234') { setUserRole('teacher_admin'); } else { alert('密碼錯誤！'); }
        }
      };

      const saveConfigToFirebase = () => {
        db.collection('artifacts').doc(appId).collection('public').doc('config').set(config)
          .then(() => alert('雲端開關狀態儲存成功！'))
          .catch(err => alert('儲存失敗：' + err.message));
      };

      // 【無脊椎動物專用】配對點擊邏輯 (完全保留)
      const handleInvertBoxClick = (categoryKey) => {
        if (isQuizSubmitted || !selectedCard) return;
        if (selectedCard.target === categoryKey) {
          setMatchedCards(prev => [...prev, selectedCard]);
          setSelectedCard(null);
        } else {
          setWrongCount(prev => prev + 1);
          setErrorCardId(selectedCard.id);
          setSelectedCard(null);
          setTimeout(() => setErrorCardId(null), 400); 
        }
      };

      // 【脊椎動物遊戲 A】點擊盒子邏輯
      const handleVertFeatureBoxClick = (categoryKey) => {
        if (isQuizSubmitted || !selectedVertFeature) return;
        if (selectedVertFeature.target === categoryKey) {
          setVertMatchedFeatures(prev => [...prev, selectedVertFeature]);
          setSelectedVertFeature(null);
        } else {
          setWrongCount(prev => prev + 1);
          setVertFeatureErrorId(selectedVertFeature.id);
          setSelectedVertFeature(null);
          alert("❌ 放錯分類盒囉，再試一次！");
          setTimeout(() => setVertFeatureErrorId(null), 400);
        }
      };

      // 【脊椎動物遊戲 B】點擊盒子邏輯
      const handleVertAnimalBoxClick = (categoryKey) => {
        if (isQuizSubmitted || !selectedVertAnimal) return;
        if (selectedVertAnimal.target === categoryKey) {
          setVertMatchedAnimals(prev => [...prev, selectedVertAnimal]);
          setSelectedVertAnimal(null);
        } else {
          setWrongCount(prev => prev + 1);
          setVertAnimalErrorId(selectedVertAnimal.id);
          setSelectedVertAnimal(null);
          alert("❌ 牠不屬於這一類，再試一次！");
          setTimeout(() => setVertAnimalErrorId(null), 400);
        }
      };

      const submitScoresToFirebase = () => {
        if (isQuizSubmitted) return;
        
        let remainingCards = 0;
        if (gameMode === 'invert') {
          remainingCards = INVERT_CARDS_DATA.length - matchedCards.length;
        } else {
          remainingCards = (VERT_FEATURE_CARDS.length + VERT_ANIMAL_CARDS.length) - (vertMatchedFeatures.length + vertMatchedAnimals.length);
        }
        
        const remainingQuiz = 10 - Object.keys(userQuizAnswers).length;
        
        if (remainingCards > 0 || remainingQuiz > 0) {
          let alertMsg = "🛑 無法交卷！請將所有挑戰完成：\n";
          if (remainingCards > 0) {
            alertMsg += gameMode === 'invert' 
              ? `• 🧠 圖片化配對：還有 ${remainingCards} 張卡牌尚未分類完畢。\n`
              : `• 🧠 實作配對：特徵與圖片分類尚未完全歸位（剩餘 ${remainingCards} 處）。\n`;
          }
          if (remainingQuiz > 0) alertMsg += `• 📝 實戰測驗題：還有 ${remainingQuiz} 題尚未作答。\n`;
          alert(alertMsg);
          return;
        }

        if (window.confirm("確定兩部分皆完成，要正式「交卷對答案」了嗎？")) {
          const quizData = gameMode === 'invert' ? INVERT_QUIZ_DATA : VERT_QUIZ_DATA;
          let correctCount = 0;
          quizData.forEach(q => {
            if (userQuizAnswers[q.id] === q.answer) correctCount++;
          });
          const calculatedQuizScore = correctCount * 10;
          
          setFinalQuizScore(calculatedQuizScore);
          setIsQuizSubmitted(true); 
          setActiveTab('quiz');     

          const calculatedTotal = Math.round((matchScore * 0.6) + (calculatedQuizScore * 0.4));
          db.collection('artifacts').doc(appId).collection('student_scores').add({
            class: studentClass,
            seat: studentSeat,
            name: studentName,
            chapterName: gameMode === 'invert' ? '無脊椎動物' : '脊椎動物',
            wrongCount,
            matchScore,
            quizScore: calculatedQuizScore,
            totalScore: calculatedTotal,
            time: new Date().toLocaleString(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          }).then(() => {
            alert('🎉 評分成功！成績已傳送至老師後台。');
          }).catch((err) => console.warn(err.message));
        }
      };

      return (
        <div className="min-h-screen p-2 md:p-4 text-slate-800">
          
          {/* ================= 登入介面 ================= */}
          {userRole === 'login' && (
            <div className="max-w-md mx-auto mt-16 bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
              <h2 className="text-xl md:text-2xl font-black text-center text-emerald-600 mb-6 flex items-center justify-center gap-2">
                <span>🧬</span> 國中生物探究學習網 3.2
              </h2>
              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">選擇班級</label>
                  <select value={studentClass} onChange={e => setStudentClass(e.target.value)} className="w-full border p-2.5 rounded-lg bg-white font-bold text-slate-700 outline-none focus:border-emerald-500">
                    {CLASS_OPTIONS.map(c => <option key={c} value={c}>{c} 班</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">座號</label>
                    <input type="number" placeholder="5" value={studentSeat} onChange={e => setStudentSeat(e.target.value)} className="w-full border p-2 rounded-lg font-bold outline-none focus:border-emerald-500" />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">學生姓名</label>
                    <input type="text" placeholder="同學姓名" value={studentName} onChange={e => setStudentName(e.target.value)} className="w-full border p-2 rounded-lg font-bold outline-none focus:border-emerald-500" />
                  </div>
                </div>
              </div>
              <button onClick={() => handleLogin('student')} className="w-full bg-emerald-500 text-white font-bold py-2.5 rounded-lg mb-3 hover:bg-emerald-600 shadow transition">進入學習大廳</button>
              <button onClick={() => handleLogin('teacher')} className="w-full bg-slate-500 text-white font-bold py-2 rounded-lg hover:bg-slate-600 transition text-xs">切換至教師管理後台</button>
            </div>
          )}

          {/* ================= 學生大廳 ================= */}
          {userRole === 'student_home' && (
            <div className="max-w-2xl mx-auto pt-6">
              <div className="text-center mb-6">
                <p className="text-emerald-600 font-bold mb-1">👋 {studentClass}班 {studentSeat}號 {studentName} 同學</p>
                <h1 className="text-2xl font-black text-slate-800">🐋 請選擇今日要探究的生物進度...</h1>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button 
                  onClick={() => { if(config.invertebrateOpen){ startChapter('invert'); } else { alert('🛑 該主題尚未開放！'); } }}
                  className={`p-5 rounded-xl border-2 text-left bg-white shadow-sm transition ${config.invertebrateOpen ? 'border-amber-400 hover:scale-[1.02]' : 'border-slate-200 opacity-60'}`}
                >
                  <div className="text-3xl mb-2">🪼</div>
                  <h3 className="text-lg font-black text-slate-800">3-6 無脊椎動物門</h3>
                  <p className="text-xs text-slate-400 mt-1">包含刺絲胞、扁形、軟體、環節、節肢、棘皮動物。</p>
                </button>

                <button 
                  onClick={() => { if(config.vertebrateOpen){ startChapter('vert'); } else { alert('🛑 該主題尚未開放！'); } }}
                  className={`p-5 rounded-xl border-2 text-left bg-white shadow-sm transition ${config.vertebrateOpen ? 'border-blue-400 hover:scale-[1.02]' : 'border-slate-200 opacity-60'}`}
                >
                  <div className="text-3xl mb-2">🐟</div>
                  <h3 className="text-lg font-black text-slate-800">3-6 脊椎動物亞門</h3>
                  <p className="text-xs text-slate-400 mt-1">包含特徵分類實作與 23 種線上圖片探索遊戲。</p>
                </button>
              </div>
            </div>
          )}

          {/* ================= 核心互動面板 ================= */}
          {userRole === 'game_core' && (
            <div className="max-w-6xl mx-auto bg-white p-3 md:p-6 rounded-2xl shadow-xl border border-slate-200">
              <div className="flex flex-col sm:flex-row justify-between items-center mb-4 pb-2 border-b gap-2">
                <button onClick={() => { if(!isQuizSubmitted && !window.confirm("你尚未交卷，進度會遺失。確定離開？")) return; setUserRole('student_home'); }} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg font-bold text-slate-600">⬅️ 返回主選單</button>
                <span className="text-xs font-bold bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full">🎯 當前單元：{gameMode === 'invert'?'無脊椎動物':'脊椎動物'} | 學生：{studentClass}班{studentSeat}號【{studentName}】</span>
              </div>
              
              <div className="grid grid-cols-4 bg-slate-100 rounded-xl p-1 mb-6 gap-1 font-bold text-xs md:text-sm text-center">
                <button onClick={() => setActiveTab('knowledge')} className={`py-2 rounded-lg ${activeTab === 'knowledge' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>💡 知識補給站</button>
                <button onClick={() => setActiveTab('matching')} className={`py-2 rounded-lg ${activeTab === 'matching' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>🧠 實作配對</button>
                <button onClick={() => setActiveTab('quiz')} className={`py-2 rounded-lg ${activeTab === 'quiz' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>📝 實戰測驗</button>
                <button onClick={() => setActiveTab('result')} className={`py-2 rounded-lg ${activeTab === 'result' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>📊 本次報告單</button>
              </div>

              {/* TAB 1: 💡 知識補給站 */}
              {activeTab === 'knowledge' && (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                  {(gameMode === 'invert' ? INVERT_KNOWLEDGE_CARDS : VERT_KNOWLEDGE_CARDS).map((card, i) => (
                    <div key={i} className="border border-slate-200 bg-slate-50 p-4 rounded-xl">
                      <h4 className="font-black text-emerald-600 border-b pb-1 text-sm md:text-base">{card.name}</h4>
                      <p className="text-xs text-slate-600 mt-2 leading-relaxed">{card.text}</p>
                    </div>
                  ))}
                </div>
              )}

              {/* TAB 2: 🧠 實作配對區 */}
              {activeTab === 'matching' && gameMode === 'invert' && (
                // ================== 【無脊椎動物 配對面板 (完全保留)】 ==================
                <div>
                  <div className="mb-4 bg-slate-50 p-3 rounded-xl border flex justify-between items-center text-xs">
                    <span className="font-bold">配對進度：{matchedCards.length} / {INVERT_CARDS_DATA.length} | 扣分累計：{wrongCount}次</span>
                    <span className="font-black text-emerald-700">當前得分率：{matchScore}分</span>
                  </div>
                  {poolCards.length > 0 ? (
                    <div className="max-w-md mx-auto bg-slate-50 p-6 rounded-2xl border-2 border-dashed mb-6 text-center shadow-inner">
                      <button 
                        onClick={() => setSelectedCard(poolCards[0])}
                        className={`w-full p-4 rounded-xl border-2 bg-white font-bold text-left transition shadow flex items-start gap-3
                          ${selectedCard?.id === poolCards[0].id ? 'border-emerald-500 bg-emerald-50 ring-2 ring-emerald-400' : 'border-slate-200'}
                          ${errorCardId === poolCards[0].id ? 'animate-shake border-rose-500 bg-rose-50' : ''}
                        `}
                      >
                        <span className="text-2xl">{poolCards[0].icon}</span>
                        <div>
                          <span className="text-[10px] font-black bg-blue-100 text-blue-700 px-1.5 py-0.2 rounded mb-1 inline-block">{poolCards[0].type==='feature'?'特徵':'實例'}</span>
                          <p className="text-sm text-slate-800">{poolCards[0].text}</p>
                        </div>
                      </button>
                    </div>
                  ) : <div className="text-center p-6 text-emerald-700 font-bold">🎉 無脊椎分類完成！</div>}

                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                    {Object.keys(INVERT_CATEGORY_META).map((key) => (
                      <div key={key} onClick={() => handleInvertBoxClick(key)} className="p-3 rounded-xl border-2 min-h-[140px] bg-white cursor-pointer hover:border-emerald-500 transition">
                        <div className="font-black text-sm border-b pb-1">{INVERT_CATEGORY_META[key].icon} {INVERT_CATEGORY_META[key].name}</div>
                        <div className="my-2 flex flex-wrap gap-1">
                          {matchedCards.filter(m => m.target === key).map(c => (
                            <span key={c.id} className="text-[10px] bg-slate-100 px-1 py-0.5 rounded text-slate-600 font-bold">{c.icon} {c.text.split(' ')[0]}</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === 'matching' && gameMode === 'vert' && (
                // ================== 【脊椎動物 雙遊戲面板】 ==================
                <div>
                  <div className="mb-4 bg-slate-50 p-3 rounded-xl border flex flex-col sm:flex-row justify-between items-center gap-2 text-xs">
                    <div className="flex gap-2 font-bold">
                      <span>📊 整體進度：{vertMatchedFeatures.length + vertMatchedAnimals.length} / 41</span>
                      <span className="text-rose-500">❌ 點錯扣分次數：{wrongCount} 次</span>
                    </div>
                    <span className="font-black text-emerald-700 text-sm">即時配對得分率：{matchScore} 分</span>
                  </div>

                  {/* 雙遊戲切換按鈕 */}
                  <div className="flex gap-2 mb-6 font-bold text-xs justify-center">
                    <button onClick={() => setVertSubTab('feature')} className={`px-4 py-2 rounded-full border transition ${vertSubTab === 'feature' ? 'bg-amber-500 text-white border-amber-500 shadow' : 'bg-white text-slate-600'}`}>一、構造特徵配對 ({vertMatchedFeatures.length}/18)</button>
                    <button onClick={() => setVertSubTab('animal')} className={`px-4 py-2 rounded-full border transition ${vertSubTab === 'animal' ? 'bg-blue-500 text-white border-blue-500 shadow' : 'bg-white text-slate-600'}`}>二、動物實例分類 ({vertMatchedAnimals.length}/23)</button>
                  </div>

                  {/* 遊戲 A：構造特徵配對面板 */}
                  {vertSubTab === 'feature' && (
                    <div>
                      <div className="bg-amber-50/60 p-3 rounded-xl text-xs text-amber-800 mb-4 font-bold border border-amber-200">
                        🎯 玩法說明：點選下方任一特徵卡牌（選定後會變色），再點選下方 5 個類別方盒，即可將特徵歸類。放錯會放不進去，並提示再試一次且會扣分！
                      </div>

                      {/* 一次秀出所有剩餘特徵卡牌（已修正：亂序排列） */}
                      {shuffledVertFeatures.length > 0 ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 mb-6">
                          {shuffledVertFeatures.map(card => (
                            <button
                              key={card.id}
                              onClick={() => setSelectedVertFeature(card)}
                              className={`p-3 rounded-xl border-2 text-left font-bold text-xs transition shadow-sm bg-white
                                ${selectedVertFeature?.id === card.id ? 'border-amber-500 bg-amber-50 ring-2 ring-amber-400 scale-[0.98]' : 'border-slate-200 hover:border-slate-300'}
                                ${vertFeatureErrorId === card.id ? 'animate-shake border-rose-500 bg-rose-50' : ''}
                              `}
                            >
                              📝 {card.text}
                            </button>
                          ))}
                        </div>
                      ) : (
                        <div className="bg-emerald-50 text-emerald-800 font-bold p-4 rounded-xl text-center mb-6 border text-xs">
                          🎉 恭喜！所有構造特徵皆已正確歸類完畢！請切換至「二、動物實例分類」繼續挑戰！
                        </div>
                      )}

                      {/* 遊戲 A：5 個分類盒 */}
                      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        {Object.keys(VERT_FEATURE_META).map((key) => {
                          const box = VERT_FEATURE_META[key];
                          const matchedItems = vertMatchedFeatures.filter(m => m.target === key);
                          return (
                            <div
                              key={key}
                              onClick={() => handleVertFeatureBoxClick(key)}
                              className={`p-3 rounded-xl border-2 min-h-[160px] cursor-pointer transition flex flex-col justify-between bg-white group
                                ${selectedVertFeature ? 'border-amber-400 bg-amber-50/20 hover:border-amber-500' : 'border-slate-200'}
                              `}
                            >
                              <div className="font-black text-xs text-slate-700 border-b pb-1 flex items-center gap-1">
                                <span>{box.icon}</span><span>{box.name}</span>
                              </div>
                              <div className="my-2 flex-grow overflow-y-auto max-h-[120px] space-y-1 custom-scrollbar">
                                {matchedItems.map(item => (
                                  <div key={item.id} className="text-[10px] bg-amber-50 text-amber-900 border border-amber-200 p-1 rounded font-medium leading-tight">
                                    • {item.text}
                                  </div>
                                ))}
                              </div>
                              <div className="text-[10px] text-slate-400 font-bold text-right">已集: {matchedItems.length}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* 遊戲 B：動物類別分類面板 */}
                  {vertSubTab === 'animal' && (
                    <div>
                      <div className="bg-blue-50/60 p-3 rounded-xl text-xs text-blue-800 mb-4 font-bold border border-blue-200">
                        🎯 玩法說明：每次只會顯示一張動物圖片。點選圖片卡牌使其變色選定後，點擊下方 6 個分類盒進行歸類。放錯會放不進去，提示再試一次並扣分。歸類正確才會顯示下一張圖片！
                      </div>

                      {/* 一次只顯示一張卡牌 */}
                      {poolVertAnimals.length > 0 ? (
                        <div className="max-w-xs mx-auto bg-slate-50 p-4 rounded-2xl border-2 border-dashed mb-6 text-center shadow-inner flex flex-col items-center">
                          <button
                            onClick={() => setSelectedVertAnimal(poolVertAnimals[0])}
                            className={`p-3 rounded-2xl border-2 bg-white transition shadow-md w-full flex flex-col items-center gap-2
                              ${selectedVertAnimal?.id === poolVertAnimals[0].id ? 'border-blue-500 bg-blue-50/40 ring-4 ring-blue-300 scale-[0.98]' : 'border-slate-200 hover:border-slate-300'}
                              ${vertAnimalErrorId === poolVertAnimals[0].id ? 'animate-shake border-rose-500 bg-rose-50' : ''}
                            `}
                          >
                            {/* 【修正2】補上 referrerPolicy="no-referrer" 解除雲端硬碟圖片阻擋 */}
                            <div className="w-full h-40 bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center relative">
                              <img 
                                src={poolVertAnimals[0].img} 
                                alt={poolVertAnimals[0].name}
                                referrerPolicy="no-referrer"
                                className="w-full h-full object-cover relative z-10"
                                onError={(e) => { e.target.style.display='none'; }}
                              />
                              <span className="absolute inset-0 flex items-center justify-center text-slate-400 text-xs font-bold bg-slate-100">[ 圖片加載中... ]</span>
                            </div>
                            <p className="font-black text-slate-800 text-sm tracking-wide">{poolVertAnimals[0].name}</p>
                          </button>
                        </div>
                      ) : (
                        <div className="bg-emerald-50 text-emerald-800 font-bold p-6 rounded-xl text-center mb-6 border max-w-md mx-auto text-sm">
                          🎉 太完美了！23 張動物實例圖片皆已全部正確完成分類！
                        </div>
                      )}

                      {/* 遊戲 B：細分 6 個分類盒 */}
                      <div className="grid grid-cols-2 md:grid-cols-6 gap-2">
                        {Object.keys(VERT_ANIMAL_META).map((key) => {
                          const box = VERT_ANIMAL_META[key];
                          const matchedItems = vertMatchedAnimals.filter(m => m.target === key);
                          return (
                            <div
                              key={key}
                              onClick={() => handleVertAnimalBoxClick(key)}
                              className={`p-2 rounded-xl border-2 min-h-[150px] cursor-pointer transition flex flex-col justify-between bg-white
                                ${selectedVertAnimal ? 'border-blue-400 bg-blue-50/10 hover:border-blue-500' : 'border-slate-200'}
                              `}
                            >
                              <div className="font-black text-xs text-slate-700 border-b pb-1 flex items-center gap-1">
                                <span>{box.icon}</span><span>{box.name}</span>
                              </div>
                              <div className="my-1.5 flex-grow overflow-y-auto max-h-[110px] flex flex-wrap gap-1 content-start custom-scrollbar">
                                {matchedItems.map(item => (
                                  <div key={item.id} className="text-[10px] bg-blue-50 text-blue-800 border border-blue-200 px-1 py-0.5 rounded font-bold flex items-center gap-0.5">
                                    📸 {item.name}
                                  </div>
                                ))}
                              </div>
                              <div className="text-[9px] text-slate-400 font-bold text-right">數量: {matchedItems.length}</div>
                            </div>
                          );
                        })}
                      </div>

                    </div>
                  )}

                </div>
              )}

              {/* TAB 3: 📝 實戰測驗 */}
              {activeTab === 'quiz' && (
                <div className="space-y-6 max-w-3xl mx-auto">
                  {(gameMode === 'invert' ? INVERT_QUIZ_DATA : VERT_QUIZ_DATA).map((q, qIndex) => (
                    <div key={q.id} className="bg-slate-50 border border-slate-200 p-4 rounded-xl">
                      <p className="font-bold text-sm text-slate-800 mb-3 leading-relaxed">
                        <span className="bg-slate-200 text-slate-700 font-mono px-1.5 py-0.5 rounded mr-1.5">Q{qIndex+1}</span>
                        {q.question}
                      </p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs">
                        {q.options.map((opt, optIdx) => {
                          const isSelected = userQuizAnswers[q.id] === optIdx;
                          const isCorrect = q.answer === optIdx;
                          let btnStyle = "border-slate-200 bg-white hover:bg-slate-100";
                          
                          if (isQuizSubmitted) {
                            if (isCorrect) btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-800 font-bold";
                            else if (isSelected) btnStyle = "border-rose-400 bg-rose-50 text-rose-700 line-through";
                            else btnStyle = "border-slate-100 bg-slate-50 text-slate-400";
                          } else if (isSelected) {
                            btnStyle = "border-emerald-500 bg-emerald-500 text-white font-bold shadow-sm";
                          }
                          return (
                            <button key={optIdx} onClick={() => { if(!isQuizSubmitted) setUserQuizAnswers(p=>({...p,[q.id]:optIdx})); }} className={`p-2.5 rounded-lg border text-left transition ${btnStyle}`}>
                              {optIdx + 1}. {opt}
                            </button>
                          );
                        })}
                      </div>
                      {isQuizSubmitted && (
                        <div className="mt-3 bg-white p-2.5 rounded-lg border border-slate-200 text-[11px] leading-relaxed text-slate-500 shadow-inner">
                          {userQuizAnswers[q.id] === q.answer ? <span className="text-emerald-600 font-bold">🟢 回答正確！</span> : <span className="text-rose-500 font-bold">❌ 回答錯誤！</span>}
                          <strong>解析：</strong>{q.explanation}
                        </div>
                      )}
                    </div>
                  ))}
                  {!isQuizSubmitted && (
                    <div className="pt-4 text-center">
                      <button onClick={submitScoresToFirebase} className="bg-emerald-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg hover:bg-emerald-700 transition tracking-wider">🏁 檢查完畢，正式交卷評分</button>
                    </div>
                  )}
                </div>
              )}

              {/* TAB 4: 📊 本次報告單 */}
              {activeTab === 'result' && (
                <div className="max-w-md mx-auto bg-slate-50 p-6 rounded-2xl border border-slate-200 text-center shadow-inner">
                  <h3 className="text-lg font-black text-slate-700 mb-4">📊 階段探究學習報告單</h3>
                  {isQuizSubmitted ? (
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-2 text-xs">
                        <div className="bg-white p-3 rounded-xl border"><p className="text-slate-400 font-bold">🧩 配對實作分</p><p className="text-xl font-black text-emerald-600">{matchScore} 分</p></div>
                        <div className="bg-white p-3 rounded-xl border"><p className="text-slate-400 font-bold">📝 實戰測驗分</p><p className="text-xl font-black text-blue-600">{finalQuizScore} 分</p></div>
                      </div>
                      <div className="bg-emerald-600 text-white p-4 rounded-xl shadow-sm">
                        <p className="text-xs font-bold opacity-80">⚖️ 加權總成績 (配對60% + 測驗40%)</p>
                        <p className="text-3xl font-black">{Math.round((matchScore * 0.6) + (finalQuizScore * 0.4))} 分</p>
                      </div>
                      <p className="text-xs text-slate-400 pt-2 font-medium">✨ 成績已連線即時同步，老師在後台可以直接查閱喔！</p>
                    </div>
                  ) : (
                    <div className="p-8 text-slate-400 font-bold text-sm">📭 請完成配對並至「實戰測驗」完成正式交卷後，方可解鎖本報告！</div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* ================= 教師管理後台 ================= */}
          {userRole === 'teacher_admin' && (
            <div className="max-w-6xl mx-auto bg-white p-4 md:p-6 rounded-2xl shadow-xl border border-slate-200">
              <div className="flex justify-between items-center mb-6 pb-2 border-b">
                <h1 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-2"><span>👨‍🏫</span> 教師決策管理主控台</h1>
                <button onClick={() => setUserRole('login')} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg font-bold text-slate-600">退出登入</button>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div className="p-4 bg-amber-50 rounded-xl border border-amber-200 flex items-center justify-between">
                  <div>
                    <h4 className="font-black text-amber-800 text-sm">3-6 無脊椎動物 主題開關</h4>
                    <p className="text-[11px] text-amber-600">控制全體學生是否可進入挑戰</p>
                  </div>
                  <input type="checkbox" checked={config.invertebrateOpen} onChange={e => setConfig(p => ({ ...p, invertebrateOpen: e.target.checked }))} className="w-5 h-5 accent-amber-600 cursor-pointer" />
                </div>
                <div className="p-4 bg-blue-50 rounded-xl border border-blue-200 flex items-center justify-between">
                  <div>
                    <h4 className="font-black text-blue-800 text-sm">3-6 脊椎動物 主題開關</h4>
                    <p className="text-[11px] text-blue-600">控制全體學生是否可進入挑戰</p>
                  </div>
                  <input type="checkbox" checked={config.vertebrateOpen} onChange={e => setConfig(p => ({ ...p, vertebrateOpen: e.target.checked }))} className="w-5 h-5 accent-blue-600 cursor-pointer" />
                </div>
              </div>
              
              <div className="mb-6 text-right">
                <button onClick={saveConfigToFirebase} className="bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-emerald-700 shadow transition">💾 儲存並發布雲端開關狀態</button>
              </div>

              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                <div className="flex items-center gap-3 w-full md:w-auto">
                  <label className="text-xs font-black text-slate-600 whitespace-nowrap">🔍 依班級分類顯示：</label>
                  <select value={teacherSelectClass} onChange={e => setTeacherSelectClass(e.target.value)} className="border p-2 rounded-lg bg-white font-bold text-sm text-slate-700 outline-none focus:border-emerald-500 min-w-[150px]">
                    <option value="ALL">✨ 顯示所有班級</option>
                    {CLASS_OPTIONS.map(c => <option key={c} value={c}>{c} 班</option>)}
                  </select>
                </div>
                <button onClick={() => setRefreshTrigger(p => p+1)} className="bg-slate-600 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-slate-700 transition">🔄 重新整理資料</button>
              </div>

              <div>
                <h2 className="text-sm font-black text-slate-600 mb-3">📈 學生交卷即時看板</h2>
                <div className="border border-slate-200 rounded-xl overflow-hidden shadow-inner bg-slate-50">
                  <table className="w-full text-left border-collapse text-xs md:text-sm">
                    <thead>
                      <tr className="bg-slate-100 border-b border-slate-200 text-slate-500 font-bold">
                        <th className="p-3">單元</th>
                        <th className="p-3">班級</th>
                        <th className="p-3">座號</th>
                        <th className="p-3">姓名</th>
                        <th className="p-3">配對分</th>
                        <th className="p-3">測驗分</th>
                        <th className="p-3 bg-emerald-50/50">總成績</th>
                        <th className="p-3">交卷時間</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y bg-white">
                      {filteredScores.length === 0 ? (
                        <tr><td colSpan="8" className="p-8 text-center text-slate-400 font-bold">🪹 目前尚無符合此班級的學生交卷資料。</td></tr>
                      ) : (
                        filteredScores.map((score) => (
                          <tr key={score.id} className="hover:bg-slate-50 transition">
                            <td className="p-3 font-black text-slate-600"><span className="bg-slate-100 px-1.5 py-0.5 rounded">{score.chapterName}</span></td>
                            <td className="p-3 font-bold text-emerald-600">{score.class}班</td>
                            <td className="p-3 text-slate-500">{score.seat} 號</td>
                            <td className="p-3 font-bold">{score.name}</td>
                            <td className="p-3 text-emerald-600">{score.matchScore} 分</td>
                            <td className="p-3 text-blue-600">{score.quizScore} 分</td>
                            <td className="p-3 font-black text-emerald-700 bg-emerald-50/20">{score.totalScore} 分</td>
                            <td className="p-3 text-slate-400 font-mono text-[11px]">{score.time}</td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
