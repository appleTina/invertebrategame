      { id: 'vq5', question: "蝙蝠會飛，鯨魚生活在海裡。請問牠們在分類上屬於哪一類動物？", options: ["蝙蝠是鳥類，鯨魚是魚類", "蝙蝠是哺乳類，鯨魚是魚類", "蝙蝠是鳥類，鯨魚是哺乳類", "兩者皆屬於哺乳類"], answer: 3, explanation: "蝙蝠與鯨魚雖然外觀與生活環境不同，但牠們都具備「胎生、哺乳、體表有毛髮（初生時）」的特徵，皆屬於哺乳類。" },
      { id: 'vq6', question: "脊椎動物中，屬於「內溫動物(恆溫)」的組合是？", options: ["鳥類、哺乳類", "魚類、兩生類、爬蟲類", "爬蟲類、鳥類", "兩生類、哺乳類"], answer: 0, explanation: "鳥類和哺乳類能靠體內代謝產生熱量並維持恆定的體溫，屬於內溫動物；魚類、兩生類、爬蟲類則會隨環境改變體溫，為外溫動物。" },
      { id: 'vq7', question: "鴨嘴獸和針鼴雖然會「產卵」(卵生)，但科學家仍將牠們歸類為「哺乳類」的原因是？", options: ["牠們是變溫動物", "牠們具有羽毛構造", "牠們具有乳腺，孵化後會分泌乳汁哺育幼兒", "牠們生活在陸地上"], answer: 2, explanation: "哺乳類最核心的定義特徵是「具備乳腺能哺乳」。鴨嘴獸與針鼴是演化上最原始的「單孔目」哺乳類，雖然卵生，但仍用乳汁哺育後代。" },
      { id: 'vq8', question: "下列哪一種生物屬於兩生類、且「終生保有尾巴」？", options: ["青蛙", "山椒魚", "壁虎", "巴西龜"], answer: 1, explanation: "山椒魚與蠑螈屬於兩生類中的「有尾目」，成體依然保有尾巴。青蛙屬於無尾目；壁虎和烏龜則是爬蟲類。" },
      { id: 'vq9', question: "關於鳥類「氣囊」的功能，下列敘述何者正確？", options: ["可以代替肺進行氣體交換", "能儲存空氣輔助呼吸，並在飛行時幫助散熱與增加浮力", "用來消化未磨碎的穀物", "是用來發出聲音的鳴叫構造"], answer: 1, explanation: "鳥類的氣囊不直接進行氣體交換，但能儲存空氣讓肺部在吸氣與呼氣時都能獲得氧氣（雙重呼吸），並協助散熱與減輕比重。" },
      { id: 'vq10', question: "海龜、海豚、海馬三種生活在海中的脊椎動物，其分類由演化先到後依序為？", options: ["魚類 ➔ 爬蟲類 ➔ 哺乳類", "爬蟲類 ➔ 哺乳類 ➔ 魚類", "魚類 ➔ 哺乳類 ➔ 爬蟲類", "哺乳類 ➔ 爬蟲類 ➔ 魚類"], answer: 0, explanation: "海馬是用鰓呼吸的「魚類」；海龜是用肺呼吸、有骨板的「爬蟲類」；海豚則是胎生哺乳的「哺乳類」，故依演化順序為魚類➔爬蟲類➔哺乳類。" }
    ];

    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function App() {
      const [userRole, setUserRole] = useState('login');
      const [studentClass, setStudentClass] = useState('701');
      const [studentName, setStudentName] = useState('');
      const [studentSeat, setStudentSeat] = useState('');
      
      const [gameMode, setGameMode] = useState('invert');
      const [activeTab, setActiveTab] = useState('knowledge');
      
      // 📑 教師暫存開關狀態
      const [config, setConfig] = useState({ invertebrateOpen: true, vertebrateOpen: false });
      const [studentScores, setStudentScores] = useState([]); 
      const [refreshTrigger, setRefreshTrigger] = useState(0); 

      // 🔍 老師後台專用的篩選功能欄位
      const [teacherFilterClass, setTeacherFilterClass] = useState('ALL'); // 預設顯示全部班級
      const [teacherSortMode, setTeacherSortMode] = useState('time'); // time=時間, seat=座號

      const [wrongCount, setWrongCount] = useState(0); 
      const [isQuizSubmitted, setIsQuizSubmitted] = useState(false);
      const [userQuizAnswers, setUserQuizAnswers] = useState({});     
      const [finalQuizScore, setFinalQuizScore] = useState(0);       
      const [selectedCard, setSelectedCard] = useState(null); 
      const [errorCardId, setErrorCardId] = useState(null);
      const [matchedCards, setMatchedCards] = useState([]);   
      const [seed, setSeed] = useState(0);                   

      const currentMeta = gameMode === 'invert' ? INVERT_CATEGORY_META : VERT_CATEGORY_META;
      const currentCardsData = gameMode === 'invert' ? INVERT_CARDS_DATA : VERT_CARDS_DATA;
      const currentKnowledge = gameMode === 'invert' ? INVERT_KNOWLEDGE_CARDS : VERT_KNOWLEDGE_CARDS;
      const currentQuizData = gameMode === 'invert' ? INVERT_QUIZ_DATA : VERT_QUIZ_DATA;
      const totalCardsCount = currentCardsData.length;
      const categoryKeys = Object.keys(currentMeta);

      const poolCards = useMemo(() => {
        const remaining = currentCardsData.filter(f => !matchedCards.some(m => m.id === f.id));
        return shuffleArray(remaining);
      }, [matchedCards, gameMode, seed]);

      const matchScore = useMemo(() => {
        if (matchedCards.length === 0) return 0;
        const perCardPoints = 100 / totalCardsCount; 
        const score = Math.round((matchedCards.length * perCardPoints) - wrongCount);
        return Math.max(0, Math.min(100, score));
      }, [matchedCards, wrongCount, gameMode]);

      // 🔄 即時讀取資料庫配置
      useEffect(() => {
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('config')
          .onSnapshot((doc) => { 
            if (doc.exists) {
              const data = doc.data();
              setConfig({
                invertebrateOpen: data.invertebrateOpen !== undefined ? data.invertebrateOpen : true,
                vertebrateOpen: data.vertebrateOpen !== undefined ? data.vertebrateOpen : false
              }); 
            }
          }, (err) => console.log(err));
        return () => unsubscribe();
      }, []);

      // 🔄 即時接聽學生成績變動
      useEffect(() => {
        if (userRole === 'teacher_admin') {
          const unsubscribeScores = db.collection('artifacts').doc(appId).collection('student_scores')
            .orderBy('timestamp', 'desc')
            .onSnapshot((snapshot) => {
              const scoresData = [];
              snapshot.forEach((doc) => { scoresData.push({ id: doc.id, ...doc.data() }); });
              setStudentScores(scoresData);
            }, (err) => console.error("讀取失敗:", err));
          return () => unsubscribeScores();
        }
      }, [userRole, refreshTrigger]);

      // 🎛️ 老師後台經過「篩選欄位」與「排序規則」處理後的最終列表 [cite: 131, 132]
      const processedScores = useMemo(() => {
        let list = [...studentScores];
        
        // 1. 班級篩選 [cite: 154]
        if (teacherFilterClass !== 'ALL') {
          list = list.filter(item => item.class === teacherFilterClass);
        }
        
        // 2. 排序規則
        if (teacherSortMode === 'seat') {
          // 依座號由小到大排列（先比班級再比座號） [cite: 154]
          list.sort((a, b) => {
            if (a.class !== b.class) return a.class.localeCompare(b.class);
            return Number(a.seat) - Number(b.seat);
          });
        } else {
          // 預設：依交卷順序排列（Firebase 排序好戳過來最前，不需特別重排或由新到舊維持原樣）
          // 這裡確保依最新時間降序
        }
        return list;
      }, [studentScores, teacherFilterClass, teacherSortMode]);

      const startChapter = (mode) => {
        setGameMode(mode);
        setWrongCount(0);
        setIsQuizSubmitted(false);
        setUserQuizAnswers({});
        setFinalQuizScore(0);
        setSelectedCard(null);
        setMatchedCards([]);
        setActiveTab('knowledge');
        setUserRole('game_core');
      };

      const handleLogin = (role) => {
        if (role === 'student') {
          if (!studentName || !studentSeat) { alert('請輸入座號與姓名！'); return; }
          const formattedSeat = studentSeat.padStart(2, '0');
          setStudentSeat(formattedSeat);
          setUserRole('student_home');
        } else if (role === 'teacher') {
          const pwd = prompt('請輸入老師管理密碼：');
          if (pwd === '1234') { setUserRole('teacher_admin'); } else { alert('密碼錯誤！'); }
        }
      };

      const handleBoxClick = (categoryKey) => {
        if (isQuizSubmitted) return; 
        if (!selectedCard) return;
        if (selectedCard.target === categoryKey) {
          setMatchedCards(prev => [...prev, selectedCard]);
          setSelectedCard(null);
        } else {
          setWrongCount(prev => prev + 1);
          setErrorCardId(selectedCard.id);
          setSelectedCard(null);
          setTimeout(() => setErrorCardId(null), 400); 
        }
      };

      const handleSelectQuizOption = (qId, optionIdx) => {
        if (isQuizSubmitted) return;
        setUserQuizAnswers(prev => ({ ...prev, [qId]: optionIdx }));
      };

      const answeredCount = useMemo(() => Object.keys(userQuizAnswers).length, [userQuizAnswers]);
      const finalTotalScore = useMemo(() => Math.round((matchScore * 0.6) + (finalQuizScore * 0.4)), [matchScore, finalQuizScore]);

      const submitScoresToFirebase = () => {
        if (isQuizSubmitted) return;
        const remainingCards = totalCardsCount - matchedCards.length;
        const remainingQuiz = 10 - answeredCount;
        if (remainingCards > 0 || remainingQuiz > 0) {
          let alertMsg = "🛑 無法交卷！請將所有挑戰完成：\n";
          if (remainingCards > 0) alertMsg += `• 🧠 圖片化配對：還有 ${remainingCards} 張卡牌尚未分類完畢。\n`;
          if (remainingQuiz > 0) alertMsg += `• 📝 實戰測驗題：還有 ${remainingQuiz} 題尚未作答。\n`;
          alertMsg += "\n請返回各個分頁確實完成再點選交卷！";
          alert(alertMsg);
          return;
        }

        if (window.confirm("確定兩部分皆完成，要正式「交卷對答案」了嗎？\n⚠️ 注意：交卷後無法修改任何答案！")) {
          let correctCount = 0;
          currentQuizData.forEach(q => {
            if (userQuizAnswers[q.id] === q.answer) correctCount++;
          });
          const calculatedQuizScore = correctCount * 10;
          
          setFinalQuizScore(calculatedQuizScore);
          setIsQuizSubmitted(true); 
          setActiveTab('quiz');     

          const calculatedTotal = Math.round((matchScore * 0.6) + (calculatedQuizScore * 0.4));
          db.collection('artifacts').doc(appId).collection('student_scores').add({
            class: studentClass,
            seat: studentSeat,
            name: studentName,
            chapterName: gameMode === 'invert' ? '無脊椎動物' : '脊椎動物',
            wrongCount,
            matchScore,
            quizScore: calculatedQuizScore,
            totalScore: calculatedTotal,
            time: new Date().toLocaleString(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          }).then(() => {
            alert('🎉 評分成功！作答報告已解鎖，成績已同步傳送至老師後台。');
          }).catch((err) => {
            console.warn('雲端同步提示:', err.message);
          });
        }
      };

      const saveConfigToFirebase = () => {
        db.collection('artifacts').doc(appId).collection('public').doc('config').set({
          invertebrateOpen: config.invertebrateOpen,
          vertebrateOpen: config.vertebrateOpen
        }, { merge: true })
        .then(() => {
          alert("💾 設定已成功同步存入雲端！學生端介面已即時生效！");
        })
        .catch(err => {
          alert("❌ 儲存失敗，請檢查網路連線：" + err.message);
        });
      };

      return (
        <div className="min-h-screen p-2 md:p-4 text-slate-800">
          
          {/* ================= 登入介面 ================= */}
          {userRole === 'login' && (
            <div className="max-w-md mx-auto mt-16 bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
              <h2 className="text-xl md:text-2xl font-black text-center text-emerald-600 mb-6 flex items-center justify-center gap-2">
                <span>🧬</span> 國中生物探究學習網 3.3
              </h2>
              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">選擇班級</label>
                  <select value={studentClass} onChange={e => setStudentClass(e.target.value)} className="w-full border p-2.5 rounded-lg bg-white font-bold text-slate-700 outline-none focus:border-emerald-500">
                    {CLASS_OPTIONS.map(c => <option key={c} value={c}>{c} 班</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">座號</label>
                    <input type="number" placeholder="5" value={studentSeat} onChange={e => setStudentSeat(e.target.value)} className="w-full border p-2 rounded-lg font-bold outline-none focus:border-emerald-500" />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">學生姓名</label>
                    <input type="text" placeholder="同學姓名" value={studentName} onChange={e => setStudentName(e.target.value)} className="w-full border p-2 rounded-lg font-bold outline-none focus:border-emerald-500" />
                  </div>
                </div>
              </div>
              <button onClick={() => handleLogin('student')} className="w-full bg-emerald-500 text-white font-bold py-2.5 rounded-lg mb-3 hover:bg-emerald-600 shadow transition">進入學習大廳</button>
              <button onClick={() => handleLogin('teacher')} className="w-full bg-slate-500 text-white font-bold py-2 rounded-lg hover:bg-slate-600 transition text-xs">切換至教師管理後台</button>
            </div>
          )}

          {/* ================= 學生大廳 ================= */}
          {userRole === 'student_home' && (
            <div className="max-w-2xl mx-auto pt-6">
              <div className="text-center mb-6">
                <p className="text-emerald-600 font-bold mb-1">👋 {studentClass}班 {studentSeat}號 {studentName} 同學</p>
                <h1 className="text-2xl font-black text-slate-800">🐋 請選擇今日要探究的生物進度</h1>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onClick={() => { if(config.invertebrateOpen) startChapter('invert'); else alert('🔒 老師尚未開啟此單元練習唷！'); }} className={`p-5 rounded-xl border-2 text-left bg-white shadow-sm transition ${config.invertebrateOpen ? 'border-amber-400 hover:scale-[1.02]' : 'opacity-40 cursor-not-allowed'}`}>
                  <div className="text-3xl mb-2">🪼</div>
                  <h3 className="text-lg font-black text-slate-800">3-6 無脊椎動物門 {config.invertebrateOpen ? '🟢已開放' : '🔒老師尚未開啟'}</h3>
                  <p className="text-xs text-slate-400 mt-1">包含刺絲胞、扁形、軟體、環節、節肢、棘皮動物。</p>
                </button>
                <button onClick={() => { if(config.vertebrateOpen) startChapter('vert'); else alert('🔒 老師尚未開啟此單元練習唷！'); }} className={`p-5 rounded-xl border-2 text-left bg-white shadow-sm transition ${config.vertebrateOpen ? 'border-blue-400 hover:scale-[1.02]' : 'opacity-40 cursor-not-allowed'}`}>
                  <div className="text-3xl mb-2">🐟</div>
                  <h3 className="text-lg font-black text-slate-800">3-6 脊椎動物亞門 {config.vertebrateOpen ? '🟢已開放' : '🔒老師尚未開啟'}</h3>
                  <p className="text-xs text-slate-400 mt-1">包含魚類、兩生類、爬蟲類、鳥類、哺乳類動物。</p>
                </button>
              </div>
            </div>
          )}

          {/* ================= 核心互動區面 ================= */}
          {userRole === 'game_core' && (
            <div className="max-w-6xl mx-auto bg-white p-3 md:p-6 rounded-2xl shadow-xl border border-slate-200">
              <div className="flex flex-col sm:flex-row justify-between items-center mb-4 pb-2 border-b gap-2">
                <button onClick={() => { if(!isQuizSubmitted && !window.confirm("你尚未交卷，現在離開進度會不見唷！確定離開嗎？")) return; setUserRole('student_home'); }} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg font-bold text-slate-600">⬅️ 返回主選單</button>
                <span className="text-xs font-bold bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full">🎯 當前單元：{gameMode === 'invert'?'無脊椎動物':'脊椎動物'} | 學生：{studentClass}班{studentSeat}號【{studentName}】</span>
              </div>
              
              <div className="grid grid-cols-4 bg-slate-100 rounded-xl p-1 mb-6 gap-1 font-bold text-xs md:text-sm text-center">
                <button onClick={() => setActiveTab('knowledge')} className={`py-2 rounded-lg ${activeTab === 'knowledge' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>💡 知識補給站</button>
                <button onClick={() => setActiveTab('matching')} className={`py-2 rounded-lg ${activeTab === 'matching' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>🧠 圖片化配對 ({matchedCards.length}/{totalCardsCount})</button>
                <button onClick={() => setActiveTab('quiz')} className={`py-2 rounded-lg ${activeTab === 'quiz' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>📝 實戰測驗 ({answeredCount}/10)</button>
                <button onClick={() => setActiveTab('result')} className={`py-2 rounded-lg ${activeTab === 'result' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>📊 本次報告單</button>
              </div>

              {/* TAB 1: 💡 知識補給站 */}
              {activeTab === 'knowledge' && (
                <div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    {currentKnowledge.map((card, i) => (
                      <div key={i} className="border border-slate-200 bg-slate-50 p-4 rounded-xl">
                        <h4 className="font-black text-emerald-600 border-b pb-1.5 mb-2 text-base flex items-center gap-1.5">🎯 {card.name}</h4>
                        <p className="text-xs text-slate-600 leading-relaxed font-medium">{card.text}</p>
                      </div>
                    ))}
                  </div>
                  <div className="mt-8 bg-emerald-50 rounded-xl p-4 text-center border border-emerald-100">
                    <p className="font-bold text-emerald-800 text-sm">💡 溫馨提醒：複習好觀念後，請點擊上方切換至「🧠 圖片化配對」與「📝 實戰測驗」開始作答！</p>
                  </div>
                </div>
              )}

              {/* TAB 2: 🧠 圖片化配對 */}
              {activeTab === 'matching' && (
                <div>
                  <div className="bg-slate-50 p-3 rounded-xl border text-center mb-4">
                    <span className="text-xs font-bold text-slate-500 block sm:inline">📊 配對階段計分規則：</span>
                    <span className="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded ml-1">配對正確得基本分</span>
                    <span className="text-xs bg-rose-100 text-rose-700 font-bold px-2 py-0.5 rounded ml-1">每答錯一次扣 1 分</span>
                    <div className="text-base font-black text-emerald-600 mt-1">目前預估得分：{matchScore} 分 / 答錯次數：{wrongCount} 次</div>
                  </div>

                  <div className="min-h-[110px] bg-slate-100 border-2 border-dashed border-slate-300 rounded-2xl p-4 flex flex-wrap gap-3 justify-center items-center mb-6">
                    {poolCards.length === 0 ? (
                      <div className="text-center py-2">
                        <p className="text-emerald-600 font-black text-lg">🎉 恭喜！所有生物卡牌已全數分類完畢！</p>
                        <p className="text-xs text-slate-400 mt-0.5">請繼續前往「實戰測驗」分頁作答唷！</p>
                      </div>
                    ) : (
                      poolCards.slice(0, 1).map((card) => {
                        const isSelected = selectedCard?.id === card.id;
                        const isError = errorCardId === card.id;
                        return (
                          <div key={card.id} onClick={() => { if(!isQuizSubmitted) setSelectedCard(isSelected ? null : card); }} className={`p-4 rounded-xl shadow-md border-2 max-w-sm cursor-pointer transition transform active:scale-95 text-center select-none ${isError ? 'bg-rose-100 border-rose-500 text-rose-700 animate-shake' : isSelected ? 'bg-amber-100 border-amber-500 text-amber-800 scale-105 ring-4 ring-amber-300' : 'bg-white border-slate-200 hover:border-slate-400'}`}>
                            <div className="text-4xl mb-2">{card.icon}</div>
                            <div className="font-bold text-sm md:text-base">{card.text}</div>
                            <div className="mt-2 text-[10px] bg-slate-100 text-slate-500 inline-block px-2 py-0.5 rounded-full font-bold">{card.type === 'feature'?'🔍 構造特徵':'🐾 生物實例'}</div>
                          </div>
                        );
                      })
                    )}
                  </div>

                  <div className="text-center text-xs font-black text-slate-400 mb-3 flex items-center justify-center gap-1">
                    <span>👇 請點選下方合適的分類籃，將上方卡牌投進去 👇</span>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3">
                    {categoryKeys.map((key) => {
                      const countInBox = matchedCards.filter(m => m.target === key).length;
                      return (
                        <div key={key} onClick={() => handleBoxClick(key)} className={`p-4 rounded-2xl border-2 text-center transition cursor-pointer select-none active:scale-95 flex flex-col justify-between ${selectedCard ? 'hover:scale-[1.03] hover:shadow-md' : ''} ${currentMeta[key].color}`}>
                          <div className="text-3xl mb-1">{currentMeta[key].icon}</div>
                          <div className="font-black text-sm">{currentMeta[key].name}</div>
                          <div className="text-[10px] mt-2 font-mono bg-white/60 py-0.5 rounded-full font-bold">已收納: {countInBox}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* TAB 3: 📝 實戰測驗 */}
              {activeTab === 'quiz' && (
                <div>
                  <div className="bg-slate-50 p-3 rounded-xl border text-center mb-6">
                    <span className="text-xs font-bold text-slate-500">📝 實戰題目計分：一共 10 題選擇題，每題 10 分。比例佔總分 40%。</span>
                    {isQuizSubmitted && <div className="text-lg font-black text-blue-600 mt-1">測驗部分最終得分：{finalQuizScore} 分</div>}
                  </div>

                  <div className="space-y-6 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                    {currentQuizData.map((q, idx) => {
                      const chosenIdx = userQuizAnswers[q.id];
                      return (
                        <div key={q.id} className={`p-4 rounded-xl border ${isQuizSubmitted ? (chosenIdx === q.answer ? 'bg-emerald-50/40 border-emerald-200' : 'bg-rose-50/40 border-rose-200') : 'bg-white border-slate-200'}`}>
                          <h4 className="font-bold text-sm md:text-base mb-3 flex items-start gap-1">
                            <span className="bg-slate-200 text-slate-700 text-xs px-1.5 py-0.5 rounded font-mono mt-0.5">Q{idx+1}</span>
                            <span>{q.question}</span>
                          </h4>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            {q.options.map((opt, oIdx) => {
                              let btnStyle = "border-slate-200 bg-white text-slate-700 hover:bg-slate-50";
                              if (!isQuizSubmitted && chosenIdx === oIdx) {
                                btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-700 font-bold ring-2 ring-emerald-300";
                              } else if (isQuizSubmitted) {
                                if (oIdx === q.answer) {
                                  btnStyle = "border-emerald-500 bg-emerald-500 text-white font-bold shadow-sm";
                                } else if (chosenIdx === oIdx && chosenIdx !== q.answer) {
                                  btnStyle = "border-rose-400 bg-rose-400 text-white line-through";
                                } else {
                                  btnStyle = "border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                                }
                              }
                              return (
                                <button key={oIdx} onClick={() => handleSelectQuizOption(q.id, oIdx)} className={`p-2.5 rounded-lg border text-left text-xs md:text-sm transition flex items-center gap-2 ${btnStyle}`}>
                                  <span className="w-5 h-5 rounded-full bg-black/5 flex items-center justify-center text-[11px] font-bold font-mono">{(oIdx+1)}</span>
                                  <span>{opt}</span>
                                </button>
                              );
                            })}
                          </div>
                          {isQuizSubmitted && (
                            <div className="mt-3 text-xs bg-white/80 p-2.5 rounded-lg border border-dashed text-slate-600 leading-relaxed font-medium">
                              💡 <span className="font-bold text-slate-700">解析說明：</span>{q.explanation}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {!isQuizSubmitted && (
                    <div className="mt-8 text-center border-t pt-4">
                      <button onClick={submitScoresToFirebase} className="bg-emerald-500 text-white text-base font-black px-8 py-3 rounded-xl hover:bg-emerald-600 shadow-lg transform active:scale-95 transition">🗳️ 檢查完畢，確認交卷對答案</button>
                    </div>
                  )}
                </div>
              )}

              {/* TAB 4: 📊 本次報告單 */}
              {activeTab === 'result' && (
                <div className="max-w-md mx-auto text-center py-6">
                  {!isQuizSubmitted ? (
                    <div className="p-8 border border-dashed rounded-2xl bg-slate-50">
                      <div className="text-4xl mb-2">🔒</div>
                      <h3 className="font-bold text-slate-700 mb-1">作答報告單尚未解鎖</h3>
                      <p className="text-xs text-slate-400">請先將「配對卡牌」全數分類，並「測驗作答完畢」後，點擊實戰測驗分頁最下方的交卷按鈕。</p>
                    </div>
                  ) : (
                    <div className="bg-gradient-to-br from-emerald-50 to-teal-50 border border-emerald-200 p-6 rounded-2xl shadow-inner">
                      <div className="text-5xl mb-3">🏆</div>
                      <h3 className="text-xl font-black text-slate-800 mb-4">科學探究任務完成報告</h3>
                      
                      <div className="space-y-2 text-left bg-white p-4 rounded-xl border mb-4 font-bold text-xs md:text-sm text-slate-600">
                        <div className="flex justify-between border-b pb-1.5"><span>班級座號姓名：</span><span className="text-slate-800">{studentClass}班 {studentSeat}號 {studentName}</span></div>
                        <div className="flex justify-between border-b pb-1.5"><span>探究單元進度：</span><span className="text-slate-800">{gameMode === 'invert'?'無脊椎動物':'脊椎動物'}</span></div>
                        <div className="flex justify-between border-b pb-1.5"><span>🧠 配對分數 (佔60%)：</span><span className="text-emerald-600">{matchScore} 分</span></div>
                        <div className="flex justify-between border-b pb-1.5"><span>📝 測驗分數 (佔40%)：</span><span className="text-blue-600">{finalQuizScore} 分</span></div>
                        <div className="flex justify-between pt-1 text-base font-black"><span>總合成績評分：</span><span className="text-emerald-700">{finalTotalScore} 分</span></div>
                      </div>
                      <p className="text-[11px] text-slate-400 font-medium">🎉 做的太棒了！妳的精彩數據已經即時傳上雲端，老師已經能在後台看到妳的精湛表現囉！可以關閉網頁了。</p>
                    </div>
                  )}
                </div>
              )}

            </div>
          )}

          {/* ================= 教師管理後台 ================= */}
          {userRole === 'teacher_admin' && (
            <div className="max-w-6xl mx-auto pt-4">
              <div className="flex flex-col sm:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200 gap-3">
                <div className="flex items-center gap-3">
                  <div className="bg-emerald-100 p-2 rounded-lg text-emerald-600 text-xl">👩‍🏫</div>
                  <div>
                    <h1 className="text-lg md:text-xl font-black text-slate-800">生物老師專屬雲端即時後台</h1>
                    <p className="text-xs text-slate-400 font-medium">可即時控管各班學生單元開關，並接收全校學生作答數據</p>
                  </div>
                </div>
                <button onClick={() => { setUserRole('login'); }} className="text-xs font-bold bg-slate-100 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-200 transition">退出後台</button>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                {/* 左側：單元進度開關控制 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 h-fit">
                  <h3 className="font-black text-sm text-slate-700 mb-3 flex items-center gap-1">⚙️ 控管單元開放狀態</h3>
                  <div className="space-y-3">
                    <div className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border">
                      <div>
                        <div className="text-xs font-bold text-slate-700">3-6 無脊椎動物門</div>
                        <div className="text-[10px] text-slate-400">刺絲胞、軟體、節肢、棘皮等</div>
                      </div>
                      <input type="checkbox" checked={config.invertebrateOpen} onChange={e => setConfig(prev => ({ ...prev, invertebrateOpen: e.target.checked }))} className="w-4 h-4 accent-emerald-500 cursor-pointer" />
                    </div>

                    <div className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border">
                      <div>
                        <div className="text-xs font-bold text-slate-700">3-6 脊椎動物亞門</div>
                        <div className="text-[10px] text-slate-400">魚類、兩生、爬蟲、鳥類、哺乳</div>
                      </div>
                      <input type="checkbox" checked={config.vertebrateOpen} onChange={e => setConfig(prev => ({ ...prev, vertebrateOpen: e.target.checked }))} className="w-4 h-4 accent-emerald-500 cursor-pointer" />
                    </div>
                  </div>
                  
                  <button onClick={saveConfigToFirebase} className="w-full mt-4 bg-emerald-500 text-white font-bold py-2 rounded-lg hover:bg-emerald-600 transition text-xs shadow">💾 儲存並即時更新學生端頁面</button>
                </div>

                {/* 右側：學生成績即時接收看板 */}
                <div className="lg:col-span-2 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                  
                  {/* ✨✨ 新增的控制工具列 ✨✨ */}
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b pb-3 mb-3 gap-2">
                    <h3 className="font-black text-sm text-slate-700 flex items-center gap-1">
                      <span>📊 學生交卷即時戰報</span>
                      <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full font-mono">目前總共: {studentScores.length} 筆資料</span>
                    </h3>
                    
                    {/* 🎛️ 班級篩選下拉選單與排序按鈕 */}
                    <div className="flex flex-wrap items-center gap-2 w-full sm:w-auto text-xs font-bold">
                      <div className="flex items-center gap-1 bg-slate-50 px-2 py-1.5 rounded-lg border">
                        <span className="text-slate-400 text-[11px]">篩選班級:</span>
                        <select value={teacherFilterClass} onChange={e => setTeacherFilterClass(e.target.value)} className="bg-transparent font-bold text-slate-700 outline-none cursor-pointer">
                          <option value="ALL">全部班級</option>
                          {CLASS_OPTIONS.map(c => <option key={c} value={c}>{c} 班</option>)}
                        </select>
                      </div>

                      <div className="flex items-center bg-slate-100 p-0.5 rounded-lg border">
                        <button onClick={() => setTeacherSortMode('time')} className={`px-2.5 py-1 rounded-md transition ${teacherSortMode === 'time' ? 'bg-white text-emerald-600 shadow-sm font-black' : 'text-slate-500'}`}>
                          ⏱️ 依交卷時間
                        </button>
                        <button onClick={() => setTeacherSortMode('seat')} className={`px-2.5 py-1 rounded-md transition ${teacherSortMode === 'seat' ? 'bg-white text-emerald-600 shadow-sm font-black' : 'text-slate-500'}`}>
                          🔢 依座號排序
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="overflow-x-auto max-h-[55vh] custom-scrollbar border rounded-xl">
                    <table className="w-full text-xs text-left">
                      <thead className="bg-slate-50 text-slate-500 uppercase font-bold border-b sticky top-0 z-10">
                        <tr>
                          <th className="p-2.5">進度單元</th>
                          <th className="p-2.5">班級</th>
                          <th className="p-2.5">座號</th>
                          <th className="p-2.5">姓名</th>
                          <th className="p-2.5">配對分 (60%)</th>
                          <th className="p-2.5">測驗分 (40%)</th>
                          <th className="p-2.5 bg-emerald-50/50">總成績</th>
                          <th className="p-2.5">交卷時間</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y font-medium text-slate-700">
                        {processedScores.length === 0 ? (
                          <tr><td colSpan="8" className="p-8 text-center text-slate-400 font-bold">🪹 目前尚無符合篩選條件的交卷資料。</td></tr>
                        ) : (
                          processedScores.map((score) => (
                            <tr key={score.id} className="hover:bg-slate-50 transition">
                              <td className="p-2.5 font-black text-slate-600"><span className="bg-slate-100 px-1.5 py-0.5 rounded">{score.chapterName || '無脊椎動物'}</span></td>
                              <td className="p-2.5 font-bold text-emerald-600">{score.class}班</td>
                              <td className="p-2.5 text-slate-500">{score.seat} 號</td>
                              <td className="p-2.5 font-bold">{score.name}</td>
                              <td className="p-2.5 text-emerald-600">{score.matchScore} 分</td>
                              <td className="p-2.5 text-blue-600">{score.quizScore} 分</td>
                              <td className="p-2.5 font-black text-emerald-700 bg-emerald-50/20">{score.totalScore} 分</td>
                              <td className="p-2.5 text-slate-400 font-mono text-[11px]">{score.time}</td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
